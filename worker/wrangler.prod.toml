# ABOUTME: Cloudflare Worker for Divine Relay Admin API - PRODUCTION
# ABOUTME: Deploy with: npx wrangler deploy --config wrangler.prod.toml

name = "divine-relay-admin-api-prod"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Production API route
routes = [
  { pattern = "api-relay-prod.divine.video/*", zone_name = "divine.video" }
]

# NOSTR_NSEC is bound via secrets store (shared across workers)
[[secrets_store_secrets]]
binding = "NOSTR_NSEC"
store_id = "ef490704b12a4feb91c7feb51229c364"
secret_name = "NOSTR_NSEC"

# CF Access credentials for realness proxy (shared across workers)
[[secrets_store_secrets]]
binding = "CF_ACCESS_CLIENT_ID"
store_id = "ef490704b12a4feb91c7feb51229c364"
secret_name = "CF-Access-Client-Id"

[[secrets_store_secrets]]
binding = "CF_ACCESS_CLIENT_SECRET"
store_id = "ef490704b12a4feb91c7feb51229c364"
secret_name = "CF-Access-Client-Secret"

# Bearer token for moderation-service API auth (via service binding)
[[secrets_store_secrets]]
binding = "SERVICE_API_TOKEN"
store_id = "ef490704b12a4feb91c7feb51229c364"
secret_name = "SERVICE_API_TOKEN"

[vars]
RELAY_URL = "wss://relay.divine.video"
ENVIRONMENT = "production"
# Auto-hide feature flag (set to "true" to enable automatic content hiding)
AUTO_HIDE_ENABLED = "true"
# Comma-separated list of trusted client names for auto-hide (must match client tag on kind 1984 events)
TRUSTED_CLIENTS = "diVine,divine-web,divine-mobile"
# Path for NIP-86 management API (Funnelcake uses /management)
MANAGEMENT_PATH = "/"
# Both URLs point to divine-moderation-service. Currently same hostname;
# service binding (MODERATION_API) is preferred and bypasses hostname routing.
# moderation-api.divine.video has cold start issues (support-trust-safety#119).
MODERATION_SERVICE_URL = "https://moderation-api.divine.video"
MODERATION_ADMIN_URL = "https://moderation-api.divine.video"
# Allow admin UI plus the managed web app and its preview deployments
ALLOWED_ORIGINS = "https://relay.admin.divine.video,https://app.divine.video,https://*.openvine-app.pages.dev,*.divine-relay-manager.pages.dev,*.divine-relay-admin.pages.dev"
# CDN domain for media proxy (Blossom admin bypass for blocked content preview)
CDN_DOMAIN = "media.divine.video"
# Zendesk custom field IDs for webhook callback
ZENDESK_FIELD_ACTION_STATUS = "14545793289743"
ZENDESK_FIELD_ACTION_REQUESTED = "14545826900367"
# Zendesk custom field IDs for auto-solve required fields
ZENDESK_FIELD_CATEGORY = "14559549220879"
ZENDESK_FIELD_ISSUE = "14560383908879"

# D1 Database for moderation decision log (production)
[[d1_databases]]
binding = "DB"
database_name = "divine-moderation-decisions-prod"
database_id = "d000fe55-dfac-4f54-a348-5c57241c2453"

# Service binding to divine-realness worker (bypasses CF Access 522 issue)
[[services]]
binding = "REALNESS"
service = "divine-ai-detector"

# Service binding to divine-moderation-service (bypasses CF Access + no cold starts)
# Used by handleModerateMedia (/api/v1/moderate) and handleCheckResult (/check-result/{sha256})
[[services]]
binding = "MODERATION_API"
service = "divine-moderation-service"

# Durable Objects for persistent state
[durable_objects]
bindings = [
  { name = "REPORT_WATCHER", class_name = "ReportWatcher" }
]

# DO migrations
[[migrations]]
tag = "v1"
new_classes = ["ReportWatcher"]

# Keep ReportWatcher DO alive — wake it every 5 minutes so the alarm chain
# can't break permanently after a Cloudflare-initiated eviction.
[triggers]
crons = ["*/5 * * * *"]
